<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación pendiente</title>
  <style>
    body { margin:0; padding:0; background:#f3f4f6; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table { border-collapse:collapse; }
    img { border:0; outline:none; text-decoration:none; display:block; }
    .wrap { width:100%; background:#f3f4f6; padding:24px 12px; }
    .card { width:100%; max-width:640px; background:#ffffff; border-radius:18px; overflow:hidden; box-shadow:0 10px 24px rgba(17,24,39,0.08); }
    .header { background:#003399; padding:22px 22px 18px; }
    .brand-title { color:#ffffff; font-family:Arial, Helvetica, sans-serif; font-size:18px; font-weight:800; margin:0; }
    .brand-sub { color:rgba(255,255,255,0.85); font-family:Arial, Helvetica, sans-serif; font-size:12px; margin:4px 0 0; }
    .content { padding:22px; font-family:Arial, Helvetica, sans-serif; color:#111827; }
    .p { margin:0 0 12px; line-height:1.6; font-size:14px; color:#374151; }
    .cta { display:inline-block; background:#003399; color:#ffffff !important; text-decoration:none; font-weight:800; font-size:14px; padding:12px 18px; border-radius:999px; }
  </style>
</head>
<body>
  <table role="presentation" width="100%" class="wrap">
    <tr>
      <td align="center">
        <table role="presentation" class="card" width="100%">
          <tr>
            <td class="header">
              <p class="brand-title">Unidad Educativa Particular Cristo Rey</p>
              <p class="brand-sub">Sistema de Diagnostico de Comunicacion</p>
            </td>
          </tr>
          <tr>
            <td class="content">
              <p class="p">Hola %nombre%,</p>
              <p class="p">%mensaje%</p>
              <p class="p" style="text-align:center; margin-top:20px;">
                <a class="cta" href="%base_url%/public/index.php">Ingresar al sistema</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
